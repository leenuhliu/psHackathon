<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nano Banana — Live Voice</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #fffdf0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }
    h1 { font-size: 2rem; }
    #btn {
      padding: 18px 48px;
      font-size: 1.2rem;
      border-radius: 12px;
      border: 3px solid #222;
      background: #f4d03f;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.1s;
    }
    #btn:active { transform: scale(0.96); }
    #btn:disabled { opacity: 0.4; cursor: default; }
    #btn.listening { background: #e74c3c; color: #fff; border-color: #e74c3c; }
    #status { color: #666; font-size: 0.95rem; }
    #orb {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: #ddd;
      transition: background 0.2s, transform 0.2s;
    }
    #orb.active { background: #f4d03f; transform: scale(1.15); }
    #orb.speaking { background: #2ecc71; transform: scale(1.25); }
  </style>
</head>
<body>
  <h1>🍌 Nano Banana Live</h1>
  <div id="orb"></div>
  <button id="btn">Start talking</button>
  <div id="status">Disconnected</div>

  <script>
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');
    const orb = document.getElementById('orb');

    let ws, audioCtx, source, worklet, stream;
    let audioQueue = [];
    let isPlaying = false;
    let playCtx;

    async function startSession() {
      btn.disabled = true;
      status.textContent = 'Connecting...';

      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/live`);

      ws.onopen = async () => {
        // AudioContext for capture at 16kHz
        audioCtx = new AudioContext({ sampleRate: 16000 });
        stream = await navigator.mediaDevices.getUserMedia({
          audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
        });
        await audioCtx.audioWorklet.addModule('audio-processor.js');
        source = audioCtx.createMediaStreamSource(stream);
        worklet = new AudioWorkletNode(audioCtx, 'audio-processor');
        source.connect(worklet);

        worklet.port.onmessage = (e) => {
          if (ws.readyState !== WebSocket.OPEN) return;
          const pcm = float32ToInt16(e.data);
          ws.send(JSON.stringify({ type: 'audio', data: arrayBufferToBase64(pcm.buffer) }));
        };

        status.textContent = 'Listening...';
        btn.textContent = 'Stop';
        btn.className = 'listening';
        btn.disabled = false;
        orb.className = 'active';
      };

      ws.onmessage = async (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'ready') {
          status.textContent = 'Listening...';
        } else if (msg.type === 'audio') {
          audioQueue.push(msg.data);
          if (!isPlaying) playNext();
        } else if (msg.type === 'error') {
          status.textContent = `Error: ${msg.message}`;
          stopSession();
        }
      };

      ws.onerror = () => {
        status.textContent = 'Connection error';
        stopSession();
      };

      ws.onclose = () => {
        if (status.textContent === 'Listening...') status.textContent = 'Disconnected';
        resetUI();
      };
    }

    async function playNext() {
      if (!audioQueue.length) {
        isPlaying = false;
        orb.className = 'active';
        return;
      }
      isPlaying = true;
      orb.className = 'speaking';

      const b64 = audioQueue.shift();
      const raw = base64ToArrayBuffer(b64);
      const int16 = new Int16Array(raw);
      const float32 = new Float32Array(int16.length);
      for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768;

      if (!playCtx || playCtx.state === 'closed') {
        playCtx = new AudioContext({ sampleRate: 24000 });
      }

      const buf = playCtx.createBuffer(1, float32.length, 24000);
      buf.copyToChannel(float32, 0);
      const src = playCtx.createBufferSource();
      src.buffer = buf;
      src.connect(playCtx.destination);
      src.onended = playNext;
      src.start();
    }

    function stopSession() {
      worklet?.disconnect();
      source?.disconnect();
      stream?.getTracks().forEach(t => t.stop());
      audioCtx?.close();
      ws?.close();
      audioQueue = [];
      isPlaying = false;
      resetUI();
    }

    function resetUI() {
      btn.textContent = 'Start talking';
      btn.className = '';
      btn.disabled = false;
      orb.className = '';
    }

    btn.onclick = () => {
      if (ws?.readyState === WebSocket.OPEN) stopSession();
      else startSession();
    };

    function float32ToInt16(f32) {
      const i16 = new Int16Array(f32.length);
      for (let i = 0; i < f32.length; i++) {
        i16[i] = Math.max(-32768, Math.min(32767, Math.round(f32[i] * 32768)));
      }
      return i16;
    }

    function arrayBufferToBase64(buf) {
      const bytes = new Uint8Array(buf);
      let bin = '';
      for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
      return btoa(bin);
    }

    function base64ToArrayBuffer(b64) {
      const bin = atob(b64);
      const buf = new ArrayBuffer(bin.length);
      const view = new Uint8Array(buf);
      for (let i = 0; i < bin.length; i++) view[i] = bin.charCodeAt(i);
      return buf;
    }
  </script>
</body>
</html>
