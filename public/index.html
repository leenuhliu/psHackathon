<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Builder — Dev Test</title>
  <style>
    body { font-family: monospace; max-width: 700px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
    h2 { margin-bottom: 8px; }
    .screen { display: none; background: white; padding: 24px; border-radius: 8px; margin-bottom: 16px; border: 1px solid #ddd; }
    .screen.active { display: block; }
    input, textarea { width: 100%; padding: 8px; margin: 6px 0 12px; font-family: monospace; font-size: 14px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 10px 20px; font-family: monospace; font-size: 14px; cursor: pointer; border-radius: 4px; border: 1px solid #333; background: #fff; margin-right: 8px; margin-bottom: 4px; }
    button.primary { background: #333; color: #fff; }
    button:disabled { opacity: 0.4; cursor: default; }
    canvas { border: 2px solid #333; border-radius: 4px; cursor: crosshair; touch-action: none; display: block; }
    .canvas-tools { margin: 8px 0; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .status { color: #666; font-size: 13px; margin: 8px 0; min-height: 20px; }
    .status.error { color: #c00; }
    video { width: 100%; border-radius: 4px; margin: 12px 0; }
    img.styled { width: 200px; border-radius: 4px; margin: 8px 0; display: block; border: 1px solid #ddd; }
    .scene-card { border: 1px solid #ddd; border-radius: 6px; padding: 12px; margin: 8px 0; }
    #show-id-display { font-size: 11px; color: #999; margin-top: 8px; }
    .loader { display: inline-block; width: 14px; height: 14px; border: 2px solid #ccc; border-top-color: #333; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hint-box { background: #fffbe6; padding: 10px 14px; border-radius: 4px; margin-bottom: 12px; font-size: 14px; border-left: 3px solid #f4d03f; }
  </style>
</head>
<body>

<!-- SCREEN 1: Setup -->
<div class="screen active" id="screen-setup">
  <h2>🎬 New Story</h2>
  <label>Story name</label>
  <input id="story-name" type="text" placeholder="e.g. Blobby's Big Adventure" />
  <button class="primary" onclick="startStory()">Start →</button>
  <div id="show-id-display"></div>
</div>

<!-- SCREEN 2: Draw a character -->
<div class="screen" id="screen-draw">
  <h2>🎨 Draw a Character</h2>
  <label>Character name</label>
  <input id="char-name" type="text" placeholder="e.g. Blobby" />
  <div class="canvas-tools">
    <label>Brush: <input type="range" id="brush-size" min="2" max="30" value="8" style="width:100px;margin:0 4px;"></label>
    <button onclick="clearCanvas()">Clear</button>
  </div>
  <canvas id="draw-canvas" width="620" height="340"></canvas>
  <br><br>
  <button class="primary" onclick="submitCharacter()" id="btn-add-char">Add to Story →</button>
  <button onclick="skipCharacter()">Skip</button>
  <div class="status" id="char-status"></div>
  <img class="styled" id="styled-img" style="display:none" />
  <div id="char-description" style="font-size:13px;color:#555;margin:4px 0;font-style:italic;"></div>
</div>

<!-- SCREEN 3: Scene loop -->
<div class="screen" id="screen-scene">
  <h2 id="scene-heading">Scene 1 of 3</h2>

  <div class="hint-box" id="next-prompt-display" style="display:none;"></div>

  <label>What happens in this scene?</label>
  <textarea id="scene-input" rows="3" placeholder="e.g. Blobby wanders into an enchanted forest and finds a glowing mushroom"></textarea>

  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px;">
    <button class="primary" onclick="generateScene()" id="btn-generate">Generate Scene 1</button>
    <button onclick="toggleVoice()" id="btn-voice">🎤 Voice</button>
    <span id="voice-indicator" style="font-size:12px;color:#c00;"></span>
  </div>

  <div class="status" id="scene-status"></div>

  <!-- Draw while Veo loads -->
  <div id="loading-draw-area" style="display:none;border:1px dashed #ccc;padding:16px;border-radius:6px;margin:12px 0;">
    <p style="font-size:13px;color:#555;margin-bottom:10px;">⏳ Generating your scene (~1 min)... <strong>Draw something to add to the next scene!</strong></p>
    <label>Name this character/object</label>
    <input id="loading-char-name" type="text" placeholder="e.g. Magic Mushroom" />
    <div class="canvas-tools">
      <label>Brush: <input type="range" id="brush-size-2" min="2" max="30" value="8" style="width:100px;margin:0 4px;"></label>
      <button onclick="clearCanvas2()">Clear</button>
    </div>
    <canvas id="draw-canvas-2" width="580" height="260"></canvas>
    <br><br>
    <button onclick="submitLoadingCharacter()" id="btn-add-loading">Add to Next Scene</button>
    <div class="status" id="loading-char-status"></div>
    <img class="styled" id="styled-img-2" style="display:none" />
  </div>

  <!-- Scene result -->
  <div id="scene-result" style="display:none;">
    <h4 id="scene-title" style="margin:8px 0;"></h4>
    <video id="scene-video" controls></video>
    <div id="scene-next-hint" style="font-size:13px;color:#555;margin:4px 0;font-style:italic;"></div>
  </div>
</div>

<!-- SCREEN 4: Finale -->
<div class="screen" id="screen-finale">
  <h2>🎉 Story Complete!</h2>
  <div id="all-scenes"></div>
  <button class="primary" onclick="location.reload()">Make Another Story</button>
</div>

<script>
  // ── State ───────────────────────────────────────────────────────────────
  let showId = null;
  let currentScene = 1;
  const TOTAL_SCENES = 3;
  const scenes = [];

  // ── Screen 1: Setup ─────────────────────────────────────────────────────
  function startStory() {
    const name = document.getElementById('story-name').value.trim();
    if (!name) return alert('Enter a story name');
    showId = crypto.randomUUID();
    document.getElementById('show-id-display').textContent = `show_id: ${showId}`;
    show('screen-draw');
  }

  // ── Canvas setup ─────────────────────────────────────────────────────────
  const canvas1 = document.getElementById('draw-canvas');
  const ctx1 = canvas1.getContext('2d');
  initCanvas(canvas1, ctx1);

  const canvas2 = document.getElementById('draw-canvas-2');
  const ctx2 = canvas2.getContext('2d');
  initCanvas(canvas2, ctx2);

  function initCanvas(canvas, ctx) {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    let drawing = false;
    const brushId = canvas === canvas1 ? 'brush-size' : 'brush-size-2';
    const pos = (e) => {
      const r = canvas.getBoundingClientRect();
      const s = e.touches ? e.touches[0] : e;
      return { x: (s.clientX - r.left) * (canvas.width / r.width), y: (s.clientY - r.top) * (canvas.height / r.height) };
    };
    const down = (e) => { drawing = true; const p = pos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); e.preventDefault(); };
    const move = (e) => {
      if (!drawing) return;
      const p = pos(e);
      ctx.lineWidth = document.getElementById(brushId).value;
      ctx.lineCap = 'round'; ctx.strokeStyle = '#111';
      ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault();
    };
    const up = () => drawing = false;
    canvas.addEventListener('mousedown', down); canvas.addEventListener('mousemove', move);
    canvas.addEventListener('mouseup', up); canvas.addEventListener('mouseleave', up);
    canvas.addEventListener('touchstart', down, { passive: false });
    canvas.addEventListener('touchmove', move, { passive: false });
    canvas.addEventListener('touchend', up);
  }

  function clearCanvas() { ctx1.fillStyle = '#fff'; ctx1.fillRect(0, 0, canvas1.width, canvas1.height); }
  function clearCanvas2() { ctx2.fillStyle = '#fff'; ctx2.fillRect(0, 0, canvas2.width, canvas2.height); }

  // ── Screen 2: Submit character ───────────────────────────────────────────
  async function submitCharacter() {
    const name = document.getElementById('char-name').value.trim();
    if (!name) return alert('Give your character a name');
    await addCharacter(name, canvas1, 'btn-add-char', 'char-status', 'styled-img', 'char-description');
    setTimeout(() => show('screen-scene'), 1500);
  }

  function skipCharacter() { show('screen-scene'); }

  // ── Screen 3: Generate scene ─────────────────────────────────────────────
  async function generateScene() {
    const input = document.getElementById('scene-input').value.trim();
    if (!input) return alert('Describe the scene');
    const btn = document.getElementById('btn-generate');
    const status = document.getElementById('scene-status');
    btn.disabled = true;
    document.getElementById('scene-result').style.display = 'none';
    document.getElementById('loading-draw-area').style.display = 'block';
    status.innerHTML = `<span class="loader"></span>Generating scene ${currentScene} with Veo (~1 min)...`;

    try {
      const res = await fetch('/api/generate-scene', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ show_id: showId, scene_number: currentScene, user_input: input })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      scenes.push(data);
      document.getElementById('loading-draw-area').style.display = 'none';
      document.getElementById('scene-title').textContent = data.episode_title;
      document.getElementById('scene-video').src = data.video_url;
      document.getElementById('scene-next-hint').textContent = data.next_prompt || '';
      document.getElementById('scene-result').style.display = 'block';
      status.textContent = `✓ Scene ${currentScene} ready!`;

      if (currentScene < TOTAL_SCENES) {
        currentScene++;
        document.getElementById('scene-heading').textContent = `Scene ${currentScene} of ${TOTAL_SCENES}`;
        document.getElementById('btn-generate').textContent = `Generate Scene ${currentScene}`;
        document.getElementById('scene-input').value = '';
        if (data.next_prompt) {
          const hint = document.getElementById('next-prompt-display');
          hint.textContent = `💬 ${data.next_prompt}`;
          hint.style.display = 'block';
        }
        btn.disabled = false;
      } else {
        status.textContent = '✓ All scenes done!';
        showFinale();
      }
    } catch (e) {
      status.className = 'status error';
      status.textContent = `Error: ${e.message}`;
      document.getElementById('loading-draw-area').style.display = 'none';
      btn.disabled = false;
    }
  }

  // ── Loading-time draw ────────────────────────────────────────────────────
  async function submitLoadingCharacter() {
    const name = document.getElementById('loading-char-name').value.trim();
    if (!name) return alert('Name your character/object');
    await addCharacter(name, canvas2, 'btn-add-loading', 'loading-char-status', 'styled-img-2', null);
    document.getElementById('loading-char-status').textContent = `✓ ${name} will appear in the next scene!`;
  }

  // ── Shared character add ─────────────────────────────────────────────────
  async function addCharacter(name, canvas, btnId, statusId, imgId, descId) {
    const btn = document.getElementById(btnId);
    const status = document.getElementById(statusId);
    btn.disabled = true;
    status.innerHTML = '<span class="loader"></span>Styling your drawing...';
    try {
      const res = await fetch('/api/add-character', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ show_id: showId, name, image_data: canvas.toDataURL('image/png') })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      const img = document.getElementById(imgId);
      img.src = data.styled_frame_url;
      img.style.display = 'block';
      if (descId) document.getElementById(descId).textContent = `"${data.description}"`;
      status.textContent = `✓ ${name} added!`;
      btn.textContent = 'Add Another';
      btn.disabled = false;
    } catch (e) {
      status.className = 'status error';
      status.textContent = `Error: ${e.message}`;
      btn.disabled = false;
    }
  }

  // ── Finale ───────────────────────────────────────────────────────────────
  function showFinale() {
    document.getElementById('all-scenes').innerHTML = scenes.map((s, i) => `
      <div class="scene-card">
        <h4>Scene ${i + 1}: ${s.episode_title}</h4>
        <video src="${s.video_url}" controls></video>
      </div>
    `).join('');
    show('screen-finale');
  }

  // ── Voice input (Web Speech API) ─────────────────────────────────────────
  let recognition = null;
  function toggleVoice() {
    const btn = document.getElementById('btn-voice');
    const indicator = document.getElementById('voice-indicator');
    if (recognition) {
      recognition.stop(); recognition = null;
      btn.textContent = '🎤 Voice'; indicator.textContent = '';
      return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return alert('Speech recognition not supported in this browser. Use Chrome.');
    recognition = new SR();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.onresult = (e) => {
      document.getElementById('scene-input').value =
        Array.from(e.results).map(r => r[0].transcript).join('');
    };
    recognition.onend = () => { btn.textContent = '🎤 Voice'; indicator.textContent = ''; recognition = null; };
    recognition.onerror = (e) => { indicator.textContent = `Error: ${e.error}`; };
    recognition.start();
    btn.textContent = '⏹ Stop';
    indicator.textContent = '● recording';
  }

  // ── Utility ──────────────────────────────────────────────────────────────
  function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
  }
</script>
</body>
</html>
